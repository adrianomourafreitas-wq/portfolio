  .card{
  position:relative;
  border-radius:16px;
  background:#020617;
  padding:14px;
  display:flex;
  flex-direction:column;
  }

  .card::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:18px;
    background:linear-gradient(270deg,#171A4A,#000020,#0303b5,#2F2C79);
    background-size:400% 400%;
    animation:borderAnim 6s linear infinite;
    z-index:-1;

    opacity:0;                 /* 🔴 INVISÍVEL por padrão */
    transition:opacity .3s ease;
  }

  /* MOSTRA O EFEITO DE LUZ AO PASSAR O MOUSE */
.card:hover::before{
  opacity:1;
}



  @keyframes borderAnim{
  0%{background-position:0% 50%}
  100%{background-position:400% 50%}
  }

  .card:hover{transform:translateY(-6px);transition:.3s}

  .image-box{
  width:100%;
  height:220px;
  margin-bottom:12px;
  background:#020617;
  border-radius:12px;
  overflow:hidden;
  }

  .image-box img{width:100%;height:100%;object-fit:contain}

  .card h3{margin:10px 0;color:#93c5fd}
  .card p{font-size:.95rem;line-height:1.5;margin-bottom:15px;color:#cbd5f5}

  .card-footer{margin-top:auto;padding-top:10px;display:flex;justify-content:center}
  .card-footer a{
  width:100%;
  max-width:220px;
  text-decoration:none;
  text-align:center;
  padding:10px;
  border-radius:8px;
  background:#2563eb;
  color:#fff;
  font-weight:bold;
  transition:.3s;
  }
  .card-footer a:hover{background:#1d4ed8}

  .video-avatar{
    position: relative;
    width: 140px;
    height: 160px;
    margin: 0 auto 20px;
    border-radius: 50%;
    display: block;
  }


  .video-avatar iframe,
  .video-avatar .foto{
    position: absolute;
    top: 20px;
    left: 9px;
    width: calc(100% - 30px);
    height: calc(100% - 30px);
    border-radius: 0;
    object-fit: cover;
  }

  .video-avatar iframe{
    z-index: 1;
  }

  .video-avatar .foto{
    z-index: 2;
  }

  .video-avatar .moldura{
    position: absolute;
    top: -14px;
    left: -14px;
    width: calc(100% + 15px);
    height: calc(100% + 40px);
    z-index: 3;
    pointer-events: none;
  }

  .video-avatar .play-text{
    position:absolute;
    bottom:-10px;
    left:49%;
    transform:translateX(-50%);
    font-size:12px;
    letter-spacing:1px;
    padding:6px 30px;
    background:rgba(0,0,0,.55);
    color:#e5e7eb;
    border-radius:20px;
    z-index:4;
    backdrop-filter:blur(6px);
    pointer-events:none;
    text-transform:uppercase;

    white-space: nowrap;
    letter-spacing: 2px;
    width: fit-content;   /* ⬅ FUNDO AJUSTA AO TEXTO */
  }


  .video-avatar:hover .play-text{

    transform:translateX(-50%) scale(1.05);

.certificados{

.btn-fixo-certificados{
  position: absolute;
  bottom: -57px;      /* sobe ou desce */
  left: 50%;
  transform: translateX(-50%);

  background: transparent;
  border: none;
  padding: 0;
  cursor: pointer;
  z-index: 20;
}

.btn-fixo-certificados img{
  width: 60px;       /* tamanho do ícone */
  height: auto;
}


.btn-voltar{
  margin: 20px auto -40px;      /* espaço fora do botão (topo / centro / baixo) */
  display: inline-flex;       /* faz o botão se ajustar ao conteúdo */
  align-items: center;        /* centraliza o texto na vertical */
  gap: 8px;                   /* espaço entre ícone e texto (se tiver) */
  position: fixed;   /* congela na tela */
  bottom: 20px;      /* distância do fundo */
  left: -40px;        /* distância da esquerda */
  z-index: 9999;     /* garante que fique acima de tudo */

  padding: 10px 18px;         /* tamanho interno do botão (altura / largura) */
  border-radius: 999px;       /* deixa o botão bem arredondado */

 background: transparent; /* ⬅️ sem fundo */
  color: #ffffff;             /* cor do texto */
  font-weight: 600;           /* deixa o texto mais forte */
  font-size: 14px;            /* tamanho do texto */

  border: none;               /* remove borda padrão */
  cursor: pointer;            /* vira “mãozinha” ao passar o mouse */

  box-shadow: none; /* ⬅️ sem sombra */
  transition: all .25s ease;  /* anima suavemente qualquer mudança */
}

.btn-voltar:hover{
  transform: translateY(-2px); /* botão sobe levemente */
  box-shadow: 0 10px 30px rgba(0,0,0,.25); /* sombra mais forte */
  filter: brightness(1.1);     /* deixa o botão um pouco mais claro */
}

.btn-voltar img{
  width: 200px;   /* tamanho da imagem */
  height: 200px;  /* mantém proporção */
}


/* imagem do botão */
.btn-fixo-certificados img{
  width:150px;          /* ⬅ tamanho do botão */
  height:auto;
  transition:transform .3s ease, filter .3s ease;
}

/* efeito elegante ao passar o mouse */
.btn-fixo-certificados:hover img{
  transform:scale(1.1);
  filter:drop-shadow(0 0 12px rgba(59,130,246,.8));
}


html{

.modal-certificados{
  position:fixed;

}

.lista-certificados{

}

.lista-certificados li{
  margin-bottom:12px;
}

.lista-certificados a{
  display:block;

  border-radius:10px;
  background:#020617;
  color:#93c5fd;
  text-decoration:none;
  font-weight:600;

}

.lista-certificados a:hover{
  background:#1e40af;

}

#viewerCertificado{
  max-width: 90vw;

  border-radius: 12px;
  display: none;
}

/* esconder botões quando certificado estiver aberto */
body.certificado-aberto #fullscreenBtn,
body.certificado-aberto .btn-fixo-certificados,
body.certificado-aberto .btn-voltar {

  function renderizarCertificados() {
  const gridCertificados = document.getElementById("gridCertificados");
  const modal = document.getElementById("modalCertificados");
  const viewerCertificado = document.getElementById("viewerCertificado");

  gridCertificados.innerHTML = "";

  certificados.forEach(cert => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.cursor = "pointer";

    card.innerHTML = `
      <h3>${cert.titulo}</h3>
      <p>Clique para visualizar</p>
    `;

  card.addEventListener("click", () => {
  const container = document.querySelector(".modal-conteudo");

  // remove imagem antiga (se existir)
  const imgAntiga = document.getElementById("viewerCertificado");
  if (imgAntiga) imgAntiga.remove();

  // cria nova imagem
  const novaImg = document.createElement("img");
  novaImg.id = "viewerCertificado";
  novaImg.src = cert.imagem;
  novaImg.style.display = "block";

  container.appendChild(novaImg);

  // 🔑 ESCONDE OS BOTÕES
  document.body.classList.add("certificado-aberto");

  modal.classList.add("ativo");
  });


    gridCertificados.appendChild(card);
  });
  }


  const gridProjetos = document.getElementById("gridProjetos");
  projetos.forEach(p => criarCard(p, gridProjetos));


  function criarCard(p,container){

const logos = {
  powerbi: "powerbi.png",
  excel: "excel.png",
  python: "python.png",
  sql: "sql.png",
  powerpoint: "powerpoint.png",
  web: "web.png"
};

  const logoHTML = p.tipo 
    ? `<div class="logo-tipo"><img src="${logos[p.tipo]}"></div>` 
    : "";

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
  ${logoHTML}
  <div class="image-box"><img src="${p.imagem}"></div>
  <h3>${p.titulo}</h3>
  <p>${p.descricao}</p>
  <div class="card-footer"><a href="${p.link}" target="_blank">Abrir</a></div>
  `;

  container.appendChild(card);
  }



  document.getElementById("fullscreenBtn").onclick=()=>{
  document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();
  };

  const cards = document.querySelectorAll(".card");

  window.addEventListener("scroll", () => {
    const center = window.innerHeight / 2;

    cards.forEach(card => {
      const rect = card.getBoundingClientRect();
      const cardCenter = rect.top + rect.height / 2;

      const distance = Math.abs(center - cardCenter);

      // Quanto mais longe do centro, menor fica
      let scale = 1 - (distance / window.innerHeight) * 0.35;

      // Limites de tamanho
      scale = Math.max(0.75, Math.min(1, scale));

      card.style.transform = `translateY(-4px) scale(${scale})`;

    });
  });


const btnCertificados = document.querySelector(".btn-fixo-certificados");
const secaoCertificados = document.getElementById("secaoCertificados");
const btnVoltar = document.getElementById("voltarProjetos");
const mainProjetos = document.querySelector("main");

// 👉 ABRIR CERTIFICADOS
btnCertificados.addEventListener("click", () => {

  // esconder grid de projetos (AGORA É UM SÓ)
  document.getElementById("gridProjetos").style.display = "none";

  // mostrar certificados
  secaoCertificados.style.display = "block";

  // renderizar os cards
  renderizarCertificados();

  // rolar para o topo
  window.scrollTo({ top: 0, behavior: "smooth" });
});



btnVoltar.addEventListener("click", () => {

  // esconder certificados
  secaoCertificados.style.display = "none";

  // mostrar grid de projetos novamente
  document.getElementById("gridProjetos").style.display = "grid";

  // rolar para o topo
  window.scrollTo({ top: 0, behavior: "smooth" });
});


const modalCertificados = document.getElementById("modalCertificados");
const fecharCertificados = document.getElementById("fecharCertificados");


// fechar modal no X
fecharCertificados.addEventListener("click", () => {
  modalCertificados.classList.remove("ativo");

  // remove classe que escondia botões
  document.body.classList.remove("certificado-aberto");

  // remove a imagem atual
  const img = document.getElementById("viewerCertificado");
  if (img) img.remove();
});

// fechar clicando fora do modal
modalCertificados.addEventListener("click", (e) => {
  if (e.target === modalCertificados) {
    modalCertificados.classList.remove("ativo");

    document.body.classList.remove("certificado-aberto");

    const img = document.getElementById("viewerCertificado");
    if (img) img.remove();
  }
});
